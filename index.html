<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Tenerife App</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS -->
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Theme -->
 <meta name="theme-color" content="#f5f5f5">
</head>

<body>

  <!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>Welcome to Tenerife</h1>
    <p>Explore the island with me</p>
  </div>

  <!-- SVG CURVE -->
  <svg class="curve" viewBox="0 0 1440 120" preserveAspectRatio="none">
  <path d="M0,60 Q720,120 1440,60 L1440,120 L0,120 Z" fill="#f5f5f5"></path>
</svg>
</div>

  <!-- CATEGORY BAR -->
  <div class="categories">
    <div class="category">
      <span>📍</span>
      <p>Plan</p>
    </div>
    <div class="category">
      <span>🍔</span>
      <p>Food & Drink</p>
    </div>
    <div class="category">
      <span>🥾</span>
      <p>Excursions</p>
    </div>
    <div class="category">
      <span>🗺️</span>
      <p>Map</p>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <h2 class="section-title">Trending spots</h2>

    <div class="cards">
      <div class="card" style="background-image: url('hero2.jpg')">
        <span>Hiking</span>
      </div>

      <div class="card" style="background-image: url('hero2.jpg')">
        <span>Experiences</span>
      </div>

      <div class="card" style="background-image: url('hero2.jpg')">
        <span>Parks</span>
      </div>

      <div class="card" style="background-image: url('hero2.jpg')">
        <span>Natural Beauty</span>
      </div>
    </div>

  </div>

  <!-- FLOAT BUTTON -->
  <div class="fab">+</div>

</body>
</html>
