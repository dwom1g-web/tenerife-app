<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS App Mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tenerife">

  <!-- Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon.png">

  <title>Tenerife App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- HERO -->
    <div class="hero">
      <div class="hero-text">
        <h1>Welcome to Tenerife</h1>
        <p>Explore the island with me</p>
      </div>
    </div>

    <!-- CATEGORIES -->
    <div class="categories">
      <div class="category">
        <span>📊</span>
        <p>Plan</p>
      </div>
      <div class="category">
        <span>🍽️</span>
        <p>Food & Drink</p>
      </div>
      <div class="category">
        <span>🌴</span>
        <p>Excursions</p>
      </div>
      <div class="category">
        <span>🗺️</span>
        <p>Map</p>
      </div>
    </div>

    <!-- TRENDING -->
    <h2 class="section-title">Trending spots</h2>

    <div class="cards">
      <div class="card" style="background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')">
        <span>Hiking</span>
      </div>
      <div class="card" style="background-image:url('https://images.unsplash.com/photo-1526772662000-3f88f10405ff')">
        <span>Experiences</span>
      </div>
      <div class="card" style="background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')">
        <span>Parks</span>
      </div>
      <div class="card" style="background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')">
        <span>Natural Beauty</span>
      </div>
    </div>

  </div>

  <!-- FLOATING BUTTON (OUTSIDE APP) -->
  <div class="fab">+</div>

</body>
</html>
