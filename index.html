<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tenerife App</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- APP ICON (CRITICAL) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <!-- Browser icon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icon.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS FULLSCREEN -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- THEME -->
  <meta name="theme-color" content="#f5f5f5">
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-text">
      <h1>Welcome to Tenerife</h1>
      <p>Explore the island with me</p>
    </div>

    <!-- CURVE -->
    <svg class="curve" viewBox="0 0 1440 160" preserveAspectRatio="none">
      <path d="M0,0 C400,140 1040,140 1440,0 L1440,160 L0,160 Z" fill="#f5f5f5"></path>
    </svg>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- CATEGORY BAR -->
    <div class="categories">
      <div class="category"><span>📍</span><p>Plan</p></div>
      <div class="category"><span>🍔</span><p>Food</p></div>
      <div class="category"><span>🥾</span><p>Trips</p></div>
      <div class="category"><span>🗺️</span><p>Map</p></div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <h2 class="section-title">Trending spots</h2>

      <div class="cards">
        <div class="card"><span>Hiking</span></div>
        <div class="card"><span>Experiences</span></div>
        <div class="card"><span>Parks</span></div>
        <div class="card"><span>Natural Beauty</span></div>
      </div>
    </div>

  </div>

  <!-- FAB -->
  <div class="fab">+</div>

</body>
</html>
