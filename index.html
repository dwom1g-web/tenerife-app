<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tenerife App</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-text">
      <h1>Welcome to Tenerife</h1>
      <p>Explore the island with me</p>
    </div>
  </div>

  <!-- 🔥 THIS WAS MISSING -->
  <div class="curve">

    <!-- CATEGORY BAR -->
    <div class="categories">
      <div class="category">
        <span>📍</span>
        <p>Plan</p>
      </div>
      <div class="category">
        <span>🍔</span>
        <p>Food & Drink</p>
      </div>
      <div class="category">
        <span>🥾</span>
        <p>Excursions</p>
      </div>
      <div class="category">
        <span>🗺️</span>
        <p>Map</p>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <h2 class="section-title">Trending spots</h2>

      <div class="cards">
        <div class="card" style="background-image: url('hero2.jpg')">
          <span>Hiking</span>
        </div>

        <div class="card" style="background-image: url('hero2.jpg')">
          <span>Experiences</span>
        </div>

        <div class="card" style="background-image: url('hero2.jpg')">
          <span>Parks</span>
        </div>

        <div class="card" style="background-image: url('hero2.jpg')">
          <span>Natural Beauty</span>
        </div>
      </div>

    </div>

  </div>

  <!-- FLOAT BUTTON -->
  <div class="fab">+</div>

</body>
</html>
