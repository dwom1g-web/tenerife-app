<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Tenerife App</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">

  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HERO (SMALLER) -->
  <div class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-text">
      <h1>Welcome to Tenerife</h1>
      <p>Explore the island with me</p>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- CATEGORY BAR -->
    <div class="categories">
      <div class="category"><span>📍</span><p>Plan</p></div>
      <div class="category"><span>🍔</span><p>Food</p></div>
      <div class="category"><span>🥾</span><p>Trips</p></div>
      <div class="category"><span>🗺️</span><p>Map</p></div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <h2 class="section-title">Trending spots</h2>

      <div class="cards">
        <div class="card"><span>Hiking</span></div>
        <div class="card"><span>Experiences</span></div>
        <div class="card"><span>Parks</span></div>
        <div class="card"><span>Nature</span></div>
      </div>
    </div>

  </div>

  <div class="fab">+</div>

</body>
</html>
